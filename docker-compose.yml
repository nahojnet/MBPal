services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: mbpal-backend
    ports:
      - "8080:8080"
    environment:
      ORACLE_URL: jdbc:oracle:thin:@//oracle-db:1521/FREEPDB1
      ORACLE_USER: mbpal
      ORACLE_PASSWORD: mbpal
      ORACLE_SCHEMA: MBPAL
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - oracle-db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: mbpal-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  oracle-db:
    image: gvenzl/oracle-free:23-slim
    container_name: mbpal-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: mbpal
      APP_USER_PASSWORD: mbpal
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./db/oracle:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  oracle-data:
